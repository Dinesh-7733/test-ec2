name: EC2 Docker Build Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy and Build in EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          cd test-ec2

          git pull origin main

          docker build -t dinesh7733/node-backend .

          docker push dinesh7733/node-backend

          docker stop nodeapp || true
          docker rm nodeapp || true

          docker run -d -p 5009:5009 --env-file .env --name nodeapp dinesh7733/node-backend